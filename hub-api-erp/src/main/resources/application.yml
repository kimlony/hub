server:
  port: ${SERVER_PORT:3000}

spring:
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/hub_db}
    username: ${POSTGRES_USER:hub}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: hub
  configuration:
    map-underscore-to-camel-case: true

hub:
  kafka:
    topics:
      jobs: ${HUB_KAFKA_TOPICS_JOBS:${HUB_JOBS_TOPIC:hub.jobs}}
      dlq: ${HUB_JOBS_DLQ_TOPIC:hub.jobs.dlq}
    jobs-topic:
      partitions: ${HUB_JOBS_TOPIC_PARTITIONS:4}
      replicas: ${HUB_JOBS_TOPIC_REPLICAS:1}
  schedule:
    collect-catch-up-minutes: ${HUB_SCHEDULE_COLLECT_CATCH_UP_MINUTES:120}
    crawl-dart-ms: ${HUB_SCHEDULE_CRAWL_DART_MS:300000}
    crawl-rss-ms: ${HUB_SCHEDULE_CRAWL_RSS_MS:120000}
  order:
    normalize-scan-ms: ${HUB_ORDER_NORMALIZE_SCAN_MS:60000}
    normalize-initial-delay-ms: ${HUB_ORDER_NORMALIZE_INITIAL_DELAY_MS:30000}
  security:
    enabled: ${HUB_SECURITY_ENABLED:true}
    header-name: ${HUB_API_KEY_HEADER:X-Hub-Api-Key}
    api-key: ${HUB_API_KEY}
  jwt:
    secret: ${HUB_JWT_SECRET}
    expiry-ms: ${HUB_JWT_EXPIRY_MS:86400000}
  aes:
    secret: ${HUB_AES_SECRET}
  outbox:
    publish-delay-ms: ${HUB_OUTBOX_PUBLISH_DELAY_MS:3000}
    batch-size: ${HUB_OUTBOX_BATCH_SIZE:50}
    publishing-stale-seconds: ${HUB_OUTBOX_PUBLISHING_STALE_SECONDS:60}
