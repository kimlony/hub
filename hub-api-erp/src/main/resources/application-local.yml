spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_HOST_PORT:5432}/${POSTGRES_DB:hub_db}
    username: ${POSTGRES_USER:hub}
    password: ${POSTGRES_PASSWORD:change-me-dev-db-password}
  kafka:
    bootstrap-servers: localhost:${KAFKA_HOST_PORT:19092}

hub:
  jwt:
    ui:
      secret: ${HUB_UI_JWT_SECRET:change-me-ui-jwt-secret-local-32-bytes!!}
      expiry-ms: 86400000
      issuer: easy-hub-ui
      audience: easy-hub-web
    external:
      secret: ${HUB_EXTERNAL_JWT_SECRET:change-me-external-jwt-secret-local-32-bytes!!}
      issuer: easy-hub-external
      audience: easy-hub-external-api
  aes:
    secret: ${HUB_AES_SECRET:change-me-32-byte-secret-local!!}
