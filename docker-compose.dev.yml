services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  kafka:
    ports:
      - "${KAFKA_HOST_PORT:-19092}:9094"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

  hub-api:
    ports:
      - "${HUB_API_PORT:-3000}:3000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
  hub-worker-consumer:
    environment:
      MOCK_MALL_FIXTURE_DIR: /app/mock-fixtures
    volumes:
      - ./mock-fixtures:/app/mock-fixtures:ro

  hub-worker-recovery:
    environment:
      MOCK_MALL_FIXTURE_DIR: /app/mock-fixtures
    volumes:
      - ./mock-fixtures:/app/mock-fixtures:ro

  hub-worker-http:
    environment:
      MOCK_MALL_FIXTURE_DIR: /app/mock-fixtures
    volumes:
      - ./mock-fixtures:/app/mock-fixtures:ro