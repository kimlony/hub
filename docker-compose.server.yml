services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hub_db}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - hub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hub-net

  kafka:
    image: apache/kafka:3.7.2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-4}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - hub_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - hub-net

  hub-api:
    build:
      context: ./hub-api-erp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-3000}
      POSTGRES_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/hub_db}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      HUB_KAFKA_TOPICS_JOBS: ${HUB_KAFKA_TOPICS_JOBS:-hub.jobs}
      HUB_JOBS_DLQ_TOPIC: ${HUB_JOBS_DLQ_TOPIC:-hub.jobs.dlq}
      HUB_KAFKA_CONSUMER_GROUP: ${KAFKA_GROUP_ID:-hub-worker-group}
      HUB_SECURITY_ENABLED: ${HUB_SECURITY_ENABLED:-true}
      HUB_API_KEY: ${HUB_API_KEY:?HUB_API_KEY is required}
      HUB_JWT_SECRET: ${HUB_JWT_SECRET:?HUB_JWT_SECRET is required}
      HUB_AES_SECRET: ${HUB_AES_SECRET:?HUB_AES_SECRET is required}
      HUB_OUTBOX_PUBLISH_DELAY_MS: ${HUB_OUTBOX_PUBLISH_DELAY_MS:-3000}
      HUB_OUTBOX_BATCH_SIZE: ${HUB_OUTBOX_BATCH_SIZE:-50}
      HUB_OUTBOX_PUBLISHING_STALE_SECONDS: ${HUB_OUTBOX_PUBLISHING_STALE_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-3000}/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - hub-net

  hub-worker-consumer:
    build:
      context: ./hub-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WORKER_ROLE: consumer
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-hub_db}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      HUB_AES_SECRET: ${HUB_AES_SECRET:?HUB_AES_SECRET is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-hub.jobs}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-hub.jobs.dlq}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-hub-worker-group}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-hub-worker}
      JOB_LOCK_TTL_MINUTES: ${JOB_LOCK_TTL_MINUTES:-30}
      JOB_LEASE_MINUTES: ${JOB_LEASE_MINUTES:-30}
      JOB_RETRY_BACKOFF_MS: ${JOB_RETRY_BACKOFF_MS:-60000,300000,900000}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: ${GRACEFUL_SHUTDOWN_TIMEOUT_MS:-60000}
      GODO_BASE_URL: ${GODO_BASE_URL:-http://openhub.godo.co.kr/godomall5}
      GODO_PAGE_SIZE: ${GODO_PAGE_SIZE:-100}
      GCHAN_BASE_URL: ${GCHAN_BASE_URL:-https://example.invalid/gchan}
      WCHAN_BASE_URL: ${WCHAN_BASE_URL:-https://scmdev.buyis.co.kr}
      ONRY_BASE_URL: ${ONRY_BASE_URL:-https://api.onnurichance.com}
      ONRY_X_API_KEY: ${ONRY_X_API_KEY:-}
      DART_API_KEY: ${DART_API_KEY:-}
      NAVER_RSS_URLS: ${NAVER_RSS_URLS:-}
    depends_on:
      hub-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hub-net

  hub-worker-recovery:
    build:
      context: ./hub-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WORKER_ROLE: recovery
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-hub_db}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      HUB_AES_SECRET: ${HUB_AES_SECRET:?HUB_AES_SECRET is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-hub.jobs}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-hub.jobs.dlq}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-hub-worker-group}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-hub-worker}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: ${GRACEFUL_SHUTDOWN_TIMEOUT_MS:-60000}
      JOB_LOCK_TTL_MINUTES: ${JOB_LOCK_TTL_MINUTES:-30}
      JOB_LEASE_MINUTES: ${JOB_LEASE_MINUTES:-30}
      JOB_RETRY_BACKOFF_MS: ${JOB_RETRY_BACKOFF_MS:-60000,300000,900000}
      GODO_BASE_URL: ${GODO_BASE_URL:-http://openhub.godo.co.kr/godomall5}
      GODO_PAGE_SIZE: ${GODO_PAGE_SIZE:-100}
      GCHAN_BASE_URL: ${GCHAN_BASE_URL:-https://example.invalid/gchan}
      WCHAN_BASE_URL: ${WCHAN_BASE_URL:-https://scmdev.buyis.co.kr}
      ONRY_BASE_URL: ${ONRY_BASE_URL:-https://api.onnurichance.com}
      ONRY_X_API_KEY: ${ONRY_X_API_KEY:-}
      DART_API_KEY: ${DART_API_KEY:-}
      NAVER_RSS_URLS: ${NAVER_RSS_URLS:-}
    depends_on:
      hub-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hub-net

  hub-worker-http:
    build:
      context: ./hub-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WORKER_ROLE: http
      PORT: ${WORKER_HTTP_PORT:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-hub_db}
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      HUB_AES_SECRET: ${HUB_AES_SECRET:?HUB_AES_SECRET is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-hub.jobs}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-hub.jobs.dlq}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: ${GRACEFUL_SHUTDOWN_TIMEOUT_MS:-60000}
    depends_on:
      hub-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${WORKER_HTTP_PORT:-4000}/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - hub-net

networks:
  hub-net:
    driver: bridge

volumes:
  hub_postgres_data:
  hub_kafka_data:
