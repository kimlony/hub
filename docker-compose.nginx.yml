services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf.example:/etc/nginx/conf.d/default.conf:ro
      # Let’s Encrypt certificates and HTTP-01 challenge files are shared
      # with the one-off Certbot container run on the EC2 host.
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      hub-api:
        condition: service_healthy
    networks:
      - hub-net
