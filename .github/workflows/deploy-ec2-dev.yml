name: Deploy EC2 Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH || '/home/ec2-user/hub' }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EC2_HOST" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "$EC2_USER" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "Missing secret: EC2_SSH_KEY"; exit 1; }

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "$EC2_SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy and health check
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" \
            "DEPLOY_PATH='$EC2_DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          COMPOSE="docker compose -f docker-compose.server.yml -f docker-compose.dev.yml --env-file .env.dev"

          print_api_logs() {
            echo "::group::hub-api logs"
            $COMPOSE logs --tail=150 hub-api || true
            echo "::endgroup::"
          }
          trap print_api_logs ERR

          test -f .env.dev || { echo ".env.dev does not exist in $DEPLOY_PATH"; exit 1; }

          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main

          $COMPOSE config >/tmp/hub-compose-config.yml
          $COMPOSE up -d --build
          $COMPOSE ps

          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health; then
              echo
              echo "hub-api health check passed"
              exit 0
            fi
            echo "Waiting for hub-api health check... attempt ${attempt}/30"
            sleep 5
          done

          echo "hub-api health check failed"
          exit 1
          REMOTE
