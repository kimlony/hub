name: Fast CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  fast-verification:
    name: Fast verification
    runs-on: windows-latest
    env:
      # Test-only defaults. These values must never be used as production secrets.
      HUB_AES_SECRET: change-me-32-byte-secret-local!!
      POSTGRES_PASSWORD: hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            hub-worker/package-lock.json
            hub-api-erp/src/main/frontend/package-lock.json

      - name: Install worker dependencies
        working-directory: hub-worker
        run: npm ci

      - name: Install frontend dependencies
        working-directory: hub-api-erp/src/main/frontend
        run: npm ci

      - name: Run fast verification
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts/test-fast.ps1
