name: Integration Tests

on:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Testcontainers integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub-worker/package-lock.json

      - name: Install worker dependencies
        working-directory: hub-worker
        run: npm ci

      - name: Make Gradle wrapper executable
        working-directory: hub-api-erp
        run: chmod +x ./gradlew

      - name: Run Java DB integration tests
        working-directory: hub-api-erp
        env:
          RUN_DB_INTEGRATION_TESTS: "true"
        run: ./gradlew test --tests "*IntegrationTest"

      - name: Run Node DB/Kafka integration tests
        working-directory: hub-worker
        run: npm run test:integration
